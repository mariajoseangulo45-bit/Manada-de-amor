<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="formulario.css">
</head>
<body>
    <div class="card">
        <h2>CONTACTO</h2>
        <form action="/table.html" method="post">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+" title="Solo se permiten letras y espacios" required placeholder="ingrese su nombre">

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" placeholder="ingrese su apellido">

            <label for="edad">Edad:</label>
            <input type="number" id="edad" placeholder="ingrese la edad">

            <label for="correo">Inserte el correo:</label>
            <input type="email" id="correo" placeholder="ingrese el correo">

            <div class="seccion-consulta">
                <h4>Tipo de consulta</h4>
                <div class="grid-opciones">
                    <label><input type="radio" name="solicitud" value="A"> Adopción</label>
                    <label><input type="radio" name="solicitud" value="D"> Donación</label>
                    <label><input type="radio" name="solicitud" value="V"> Voluntariado</label>
                    <label><input type="radio" name="solicitud" value="i"> Info</label>
                    <label><input type="radio" name="solicitud" value="O"> Otro</label>
                </div>
            </div>

            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" rows="2" placeholder="Escribe aquí..."></textarea>
            
            <input type="submit" value="Ok" class="btn-submit">
        </form>
    </div>    
</section>
            </div>    
        </section>
</body>
</html>
